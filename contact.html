<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Request Pilot Proposal | Horaxis</title>
<link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>
<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" style="font-weight:900; font-size:24px; color:white; text-decoration:none;">HORAXIS.</a>
  </div>
</header>

<section class="section">
  <div class="container" style="max-width:700px;">
    <div class="card">
      <h1 style="margin-top:0; font-size:32px;">Request a Pilot Proposal</h1>
      <p style="color:var(--muted); margin-bottom:30px;">For Tier-1 Enterprise deployments. Our team will review your ERP architecture and provide a custom implementation roadmap within 1 business day.</p>
      
      <form>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
          <div>
            <label>Name</label>
            <input type="text" style="width:100%; padding:12px; margin-top:8px; background:#0f172a; border:1px solid #334155; color:white;">
          </div>
          <div>
            <label>Work Email</label>
            <input type="email" style="width:100%; padding:12px; margin-top:8px; background:#0f172a; border:1px solid #334155; color:white;">
          </div>
        </div>
        <div style="margin-top:20px;">
          <label>Primary ERP System (e.g., SAP S/4HANA)</label>
          <input type="text" style="width:100%; padding:12px; margin-top:8px; background:#0f172a; border:1px solid #334155; color:white;">
        </div>
        <div style="margin-top:20px;">
          <label>Message / Success Criteria</label>
          <textarea style="width:100%; height:100px; padding:12px; margin-top:8px; background:#0f172a; border:1px solid #334155; color:white;"></textarea>
        </div>
        <button type="submit" class="btn primary" style="width:100%; margin-top:30px;">Submit Proposal Request</button>
      </form>
    </div>
  </div>
</section>
</body>
</html>
