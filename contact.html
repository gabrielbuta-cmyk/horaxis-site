<header class="nav" style="border-bottom:1px solid #334155; background:rgba(15,23,42,0.9); backdrop-filter:blur(10px);">
  <div class="container nav-inner" style="display:flex; align-items:center; justify-content:space-between; height:74px; max-width:1200px; margin:0 auto; padding:0 24px;">
    <a href="index.html" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
      <div class="brand-mark"></div>
      <div class="brand-text">HORAXIS<span>.</span></div>
    </a>
    <nav class="nav-links">
        <a href="product.html" style="color:#94A3B8; margin-right:20px; text-decoration:none; font-size:14px;">Product</a>
        <a href="security.html" style="color:#94A3B8; margin-right:20px; text-decoration:none; font-size:14px;">Security</a>
        <a href="roi.html" style="color:#94A3B8; margin-right:20px; text-decoration:none; font-size:14px;">ROI Calculator</a>
        <a href="contact.html" class="btn primary" style="background:#EA580C; color:white; padding:10px 18px; border-radius:4px; text-decoration:none; font-weight:700;">PILOT PROPOSAL</a>
    </nav>
  </div>
</header>

<section style="padding:80px 0;">
  <div class="container" style="max-width:650px; margin:0 auto; padding:0 24px;">
    <div style="background:#1E293B; border-radius:4px; border-top:4px solid #EA580C; padding:40px; box-shadow:0 20px 50px rgba(0,0,0,0.3);">
      <h1 style="color:white; font-size:32px; margin:0 0 10px;">Request Pilot Proposal</h1>
      <p style="color:#94A3B8; margin:0 0 32px;">Enterprise Infrastructure Assessment for High-Volume ERP Systems.</p>

      <form id="pilotForm" style="display:grid; gap:20px;">
        <div style="display:grid; gap:8px;">
            <label style="color:#94A3B8; font-size:11px; font-weight:800; text-transform:uppercase;">Full Name</label>
            <input type="text" name="name" required style="background:#0F172A; border:1px solid #334155; padding:14px; color:white; border-radius:4px;">
        </div>
        <div style="display:grid; gap:8px;">
            <label style="color:#94A3B8; font-size:11px; font-weight:800; text-transform:uppercase;">Work Email</label>
            <input type="email" name="email" required style="background:#0F172A; border:1px solid #334155; padding:14px; color:white; border-radius:4px;">
        </div>
        <div style="display:grid; gap:8px;">
            <label style="color:#94A3B8; font-size:11px; font-weight:800; text-transform:uppercase;">Company</label>
            <input type="text" name="company" required style="background:#0F172A; border:1px solid #334155; padding:14px; color:white; border-radius:4px;">
        </div>
        <div style="display:grid; gap:8px;">
            <label style="color:#94A3B8; font-size:11px; font-weight:800; text-transform:uppercase;">Primary ERP (e.g. SAP S/4HANA)</label>
            <input type="text" name="erp" required style="background:#0F172A; border:1px solid #334155; padding:14px; color:white; border-radius:4px;">
        </div>
        <div style="display:grid; gap:8px;">
            <label style="color:#94A3B8; font-size:11px; font-weight:800; text-transform:uppercase;">Requirements</label>
            <textarea name="message" style="background:#0F172A; border:1px solid #334155; padding:14px; color:white; border-radius:4px; height:120px;"></textarea>
        </div>
        <button type="submit" style="background:#EA580C; color:white; border:none; padding:16px; font-weight:900; border-radius:4px; cursor:pointer; text-transform:uppercase;">Submit Request</button>
      </form>
    </div>
  </div>
</section>
<footer style="background:#0B1020; border-top:1px solid #334155; padding:40px 0;">
  <div class="container" style="max-width:1200px; margin:0 auto; padding:0 24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="brand-mark" style="width:24px; height:24px; border-radius:4px;"></div>

    </div>

      <a href="privacy.html" style="color:#64748B; text-decoration:none;">Privacy</a>
      <a href="terms.html" style="color:#64748B; text-decoration:none;">Terms</a>
      <a href="cookies.html" style="color:#64748B; text-decoration:none;">Cookies</a>
      <a href="dpa.html" style="color:#64748B; text-decoration:none;">DPA</a>
    </div>
  </div>
</footer>
