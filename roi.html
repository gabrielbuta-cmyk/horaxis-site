<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ROI Assessment | Horaxis Enterprise</title>
<link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" style="font-weight:900; font-size:24px; color:white; text-decoration:none;">HORAXIS.</a>
  </div>
</header>

<section class="section">
  <div class="container">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:40px;">
      <div class="card">
        <h2 style="margin-top:0;">Input Operational Scale</h2>
        <label>Annual Material Spend ($)</label>
        <input type="number" id="spend" value="50000000" style="width:100%; padding:12px; margin:8px 0 20px; background:#0f172a; border:1px solid #334155; color:white;">
        
        <label>Active PO Line Items</label>
        <input type="number" id="pos" value="10000" style="width:100%; padding:12px; margin:8px 0 20px; background:#0f172a; border:1px solid #334155; color:white;">
        
        <button onclick="calculate()" class="btn primary" style="width:100%;">Calculate Value Realization</button>
      </div>

      <div class="card" style="border-left: 4px solid var(--orange);">
        <p class="kpi-label">Projected Annual Savings</p>
        <h1 id="total" class="kpi-num">$0</h1>
        <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
          <span>Production Downtime Avoided</span>
          <strong id="downtime">$0</strong>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
          <span>Expedited Freight Reduction</span>
          <strong id="freight">$0</strong>
        </div>
        <div style="display:flex; justify-content:space-between;">
          <span>Planner Capacity Gained</span>
          <strong id="labor">$0</strong>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
function calculate() {
  const spend = parseFloat(document.getElementById('spend').value);
  const pos = parseInt(document.getElementById('pos').value);

  // Enterprise Industrial Constants
  const HOURLY_DOWNTIME_COST = 22000; 

  const downtimeVal = 12 * HOURLY_DOWNTIME_COST; // Assume 12 hours/year protected
  const freightVal = (spend * 0.05) * 0.15; // 15% reduction in expedite spend
  const laborVal = ((pos * 10) / 60) * 55; // 10 mins saved/PO * $55/hr

  const total = downtimeVal + freightVal + laborVal;

  document.getElementById('total').innerText = "$" + Math.round(total).toLocaleString();
  document.getElementById('downtime').innerText = "$" + Math.round(downtimeVal).toLocaleString();
  document.getElementById('freight').innerText = "$" + Math.round(freightVal).toLocaleString();
  document.getElementById('labor').innerText = "$" + Math.round(laborVal).toLocaleString();
}
// Run on load
calculate();
</script>
</body>
</html>
