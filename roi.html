<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><title>ROI Assessment | Horaxis</title>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <style>
    /* Coded Brand Mark Styles */
    .brand-mark { width: 34px; height: 34px; background: #2563EB; border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .brand-mark::before { content: ''; width: 14px; height: 14px; border: 3px solid #F8FAFC; border-radius: 50%; position: absolute; }
    .brand-mark::after { content: ''; width: 6px; height: 6px; background: #EA580C; border-radius: 50%; position: absolute; }
    .brand-text { font-weight: 900; font-size: 22px; color: #F8FAFC; letter-spacing: -0.05em; text-transform: uppercase; }
    .brand-text span { color: #EA580C; }

    /* Layout & Grid Fixes */
    .roi-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; align-items: start; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .roi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-group label { font-size: 11px; font-weight: 800; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.05em; }
    .field-group input { padding: 12px; background: #0F172A; border: 1px solid #334155; color: white; border-radius: 4px; outline: none; }
    .field-group input:focus { border-color: #EA580C; }
    .result-pane { background: #1E293B; border-left: 4px solid #EA580C; padding: 40px; border-radius: 4px; text-align: left; }
    @media (max-width: 900px) { .roi-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body style="background:#0F172A; color:white; margin:0; font-family:Inter, sans-serif;">

<header class="nav" style="border-bottom:1px solid #334155; background:rgba(15,23,42,0.9); backdrop-filter:blur(10px);">
  <div class="container nav-inner" style="display:flex; align-items:center; justify-content:space-between; height:74px; max-width:1200px; margin:0 auto; padding:0 24px;">
    <a href="index.html" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
      <div class="brand-mark"></div>
      <div class="brand-text">HORAXIS<span>.</span></div>
    </a>
    <nav style="display:flex; gap:24px; align-items:center;">
      <a href="product.html" style="color:#94A3B8; font-weight:600; text-decoration:none; font-size:14px;">Product</a>
      <a href="security.html" style="color:#94A3B8; font-weight:600; text-decoration:none; font-size:14px;">Security</a>
      <a href="roi.html" style="color:white; font-weight:600; text-decoration:none; font-size:14px;">ROI Calculator</a>
      <a href="contact.html" class="btn primary" style="background:#EA580C; color:white; padding:10px 20px; border-radius:4px; font-weight:700; text-decoration:none; font-size:13px; text-transform:uppercase;">Pilot Proposal</a>
    </nav>
  </div>
</header>

<section style="padding:100px 0;">
  <div class="roi-container">
    <div class="card" style="padding:40px; background:#1E293B; border-radius:4px;">
      <h2 style="margin-top:0; font-size:28px; margin-bottom:30px;">Industrial Business Case</h2>
      <div class="roi-grid">
        <div class="field-group"><label>Annual Spend ($)</label><input type="number" id="spend" value="50000000"></div>
        <div class="field-group"><label>Annual PO Lines</label><input type="number" id="pos" value="10000"></div>
        <div class="field-group"><label>Late Rate (%)</label><input type="number" id="lateRate" value="17"></div>
        <div class="field-group"><label>Downtime Cost ($/hr)</label><input type="number" id="lateCost" value="22000"></div>
      </div>
      <button onclick="calculate()" style="width:100%; margin-top:30px; background:#EA580C; border:none; padding:16px; color:white; font-weight:900; border-radius:4px; cursor:pointer; text-transform:uppercase;">Update Economic Impact</button>
    </div>

    <div class="result-pane">
      <span style="font-size:12px; font-weight:800; color:#94A3B8; text-transform:uppercase;">Annual Value Realized</span>
      <h1 id="totalSave" style="font-size:56px; color:#EA580C; margin:10px 0 30px;">$0</h1>
      <div style="border-top:1px solid #334155; padding-top:20px; display:grid; gap:15px;">
        <div style="display:flex; justify-content:space-between;"><span>Downtime Avoided:</span><strong id="risk">$0</strong></div>
        <div style="display:flex; justify-content:space-between;"><span>Logistics Savings:</span><strong id="freight">$0</strong></div>
      </div>
    </div>
  </div>
</section>

<footer style="background:#0B1020; border-top:1px solid #334155; padding:40px 0; margin-top:80px;">
  <div class="container" style="max-width:1200px; margin:0 auto; padding:0 24px; display:flex; justify-content:space-between; align-items:center;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="brand-mark" style="width:24px; height:24px; border-radius:4px;"></div>
      <span style="color:#94A3B8; font-size:12px;">© 2026 Horaxis Enterprise Solutions</span>
    </div>
    <div style="display:flex; gap:24px; font-size:12px; font-weight:700;">
      <a href="privacy.html" style="color:#64748B; text-decoration:none;">PRIVACY</a>
      <a href="terms.html" style="color:#64748B; text-decoration:none;">TERMS</a>
      <a href="cookies.html" style="color:#64748B; text-decoration:none;">COOKIES</a>
      <a href="dpa.html" style="color:#64748B; text-decoration:none;">DPA</a>
    </div>
  </div>
</footer>

<script>
function calculate() {
    const spend = parseFloat(document.getElementById('spend').value) || 0;
    const stopCost = parseFloat(document.getElementById('lateCost').value) || 0;
    const lateRate = (parseFloat(document.getElementById('lateRate').value) || 0) / 100;

    // 1. Productivity: Automating follow-ups on the thousands of POs shown in your dashboard
    const laborSave = (spend / 100000) * 850; 

    // 2. Risk Mitigation: Preventing major line stops (calculated as 48 hours of protection)
    const riskSave = (stopCost * 48) * (lateRate * 1.5); 

    // 3. Logistics: Reducing the "Panic Freight" seen in your Customer Impact screen
    const freightSave = (spend * 0.08) * 0.35; 

    const total = laborSave + riskSave + freightSave;

    document.getElementById('totalSave').innerText = "$" + Math.round(total).toLocaleString();
    document.getElementById('risk').innerText = "$" + Math.round(riskSave).toLocaleString();
    document.getElementById('freight').innerText = "$" + Math.round(freightSave + laborSave).toLocaleString();
}calculate();
</script>
</body>
</html>
