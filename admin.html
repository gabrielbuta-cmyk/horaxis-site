<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Support Admin — Horaxis</title>
  <meta name="robots" content="noindex, nofollow"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .admin-header { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .admin-header .logo { display: flex; align-items: center; gap: 12px; }
    .admin-header .logo span { font-size: 14px; color: #94a3b8; }
    .admin-header .logo strong { font-size: 16px; color: #f1f5f9; }
    .admin-header .actions { display: flex; gap: 12px; align-items: center; }
    .admin-header .actions button { background: #334155; border: 1px solid #475569; color: #e2e8f0; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
    .admin-header .actions button:hover { background: #475569; }
    .admin-header .refresh-indicator { font-size: 11px; color: #64748b; }

    /* Auth screen */
    .auth-screen { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    .auth-screen h2 { color: #f1f5f9; font-size: 20px; }
    .auth-screen p { color: #94a3b8; font-size: 14px; }
    .auth-screen input { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 8px; font-size: 14px; width: 300px; outline: none; transition: border-color 0.2s; }
    .auth-screen input:focus { border-color: #ea580c; }
    .auth-screen .btn { background: #ea580c; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
    .auth-screen .btn:hover { background: #dc2626; }
    .auth-screen .error { color: #ef4444; font-size: 13px; display: none; }

    /* Main layout */
    .admin-main { flex: 1; display: flex; max-width: 1400px; width: 100%; margin: 0 auto; }

    /* Ticket list */
    .ticket-list { width: 300px; min-width: 300px; border-right: 1px solid #1e293b; overflow-y: auto; height: calc(100vh - 57px); display: flex; flex-direction: column; }
    .ticket-list-header { padding: 16px; border-bottom: 1px solid #1e293b; }
    .ticket-list-header .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .ticket-list-header h3 { font-size: 14px; color: #94a3b8; font-weight: 600; }
    .ticket-list-header .count { background: #334155; color: #94a3b8; font-size: 12px; padding: 2px 8px; border-radius: 10px; }

    /* Tabs */
    .ticket-tabs { display: flex; gap: 0; }
    .ticket-tabs button { flex: 1; background: transparent; border: 1px solid #334155; color: #64748b; padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .ticket-tabs button:first-child { border-radius: 6px 0 0 6px; }
    .ticket-tabs button:last-child { border-radius: 0 6px 6px 0; }
    .ticket-tabs button.active { background: #ea580c; border-color: #ea580c; color: #fff; }

    .ticket-item { padding: 12px 16px; border-bottom: 1px solid #1e293b; cursor: pointer; transition: background 0.2s; }
    .ticket-item:hover { background: #1e293b; }
    .ticket-item.active { background: #1e293b; border-left: 3px solid #ea580c; }
    .ticket-item .ticket-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .ticket-item .ticket-id { font-size: 11px; color: #64748b; font-family: monospace; }
    .ticket-item .ticket-priority { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
    .ticket-item .ticket-priority.critical { background: #450a0a; color: #fca5a5; }
    .ticket-item .ticket-priority.high { background: #431407; color: #fdba74; }
    .ticket-item .ticket-priority.normal { background: #1e293b; color: #94a3b8; }
    .ticket-item .ticket-priority.low { background: #0f172a; color: #64748b; }
    .ticket-item .ticket-subject { font-size: 13px; color: #e2e8f0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-item .ticket-company { font-size: 11px; color: #ea580c; margin: 2px 0; }
    .ticket-item .ticket-meta { font-size: 11px; color: #64748b; margin-top: 4px; display: flex; gap: 8px; align-items: center; }

    /* Status badges */
    .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .status-badge.open { background: #1e3a5f; color: #60a5fa; }
    .status-badge.in_progress { background: #431407; color: #fdba74; }
    .status-badge.responded { background: #14532d; color: #86efac; }
    .status-badge.closed { background: #1e293b; color: #64748b; }
    .status-badge.resolved { background: #1e293b; color: #64748b; }

    /* Ticket detail */
    .ticket-detail { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 57px); }
    .ticket-detail-empty { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #64748b; }
    .ticket-detail-empty .icon { font-size: 40px; }

    .ticket-detail-header { padding: 20px 24px; border-bottom: 1px solid #1e293b; }
    .ticket-detail-header h2 { font-size: 18px; color: #f1f5f9; margin-bottom: 8px; }
    .ticket-detail-header .detail-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: #64748b; }
    .ticket-detail-header .detail-meta span { display: flex; align-items: center; gap: 4px; }

    .ticket-detail-body { flex: 1; overflow-y: auto; padding: 24px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px; }
    .detail-section .value { font-size: 14px; color: #e2e8f0; background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #334155; white-space: pre-wrap; line-height: 1.5; }

    /* Conversation history */
    .conversation-history { margin-bottom: 20px; }
    .conversation-history h4 { font-size: 13px; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .conversation-empty { font-size: 13px; color: #475569; padding: 16px 0; }

    .comment-entry { border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 1px solid #334155; }
    .comment-entry.customer { background: #1e293b; border-left: 3px solid #3b82f6; }
    .comment-entry.support { background: #1a2332; border-left: 3px solid #ea580c; }
    .comment-entry .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .comment-entry .comment-author { font-size: 12px; font-weight: 600; }
    .comment-entry.customer .comment-author { color: #60a5fa; }
    .comment-entry.support .comment-author { color: #fb923c; }
    .comment-entry .comment-time { font-size: 11px; color: #64748b; }
    .comment-entry .comment-text { font-size: 14px; color: #e2e8f0; white-space: pre-wrap; line-height: 1.5; }

    /* Response area */
    .response-area { padding: 16px 24px; border-top: 1px solid #1e293b; background: #1e293b; }
    .response-area textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; outline: none; transition: border-color 0.2s; }
    .response-area textarea:focus { border-color: #ea580c; }
    .response-area .response-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .response-area .btn-send { background: #ea580c; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .response-area .btn-send:hover { background: #dc2626; }
    .response-area .btn-send:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .response-area .send-status { font-size: 13px; color: #64748b; }

    /* Close/Resolve buttons */
    .ticket-action-buttons { display: flex; gap: 8px; margin-top: 10px; }
    .btn-close-ticket { background: #475569; color: #e2e8f0; border: none; padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-close-ticket:hover { background: #64748b; }
    .btn-close-ticket:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-resolve-ticket { background: #16a34a; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-resolve-ticket:hover { background: #15803d; }
    .btn-resolve-ticket:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-main { flex-direction: column; }
      .ticket-list { width: 100%; min-width: 100%; height: auto; max-height: 40vh; border-right: none; border-bottom: 1px solid #1e293b; }
      .ticket-detail { height: auto; min-height: 60vh; }
    }
  </style>
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen" class="auth-screen">
    <h2>Support Admin</h2>
    <p>Enter admin password to continue</p>
    <input type="password" id="auth-password" placeholder="Admin password" onkeydown="if(event.key==='Enter')authenticate()"/>
    <button class="btn" onclick="authenticate()">Sign In</button>
    <div class="error" id="auth-error">Invalid password</div>
  </div>

  <!-- Admin UI -->
  <div id="admin-app" style="display:none; flex:1; display:flex; flex-direction:column;">
    <div class="admin-header">
      <div class="logo">
        <strong>Horaxis</strong>
        <span>Support Admin</span>
      </div>
      <div class="actions">
        <span class="refresh-indicator" id="refresh-indicator"></span>
        <button onclick="refreshTickets()">Refresh</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="admin-main">
      <div class="ticket-list">
        <div class="ticket-list-header">
          <div class="header-row">
            <h3>Tickets</h3>
            <span class="count" id="ticket-count">0</span>
          </div>
          <div class="ticket-tabs">
            <button class="active" id="tab-open" onclick="switchTab('open')">Open</button>
            <button id="tab-closed" onclick="switchTab('closed')">Closed</button>
          </div>
        </div>
        <div id="ticket-list-items" style="flex:1; overflow-y:auto;">
          <div class="empty-state">
            <div class="icon">&#128233;</div>
            <p>No tickets yet</p>
          </div>
        </div>
      </div>

      <div class="ticket-detail" id="ticket-detail">
        <div class="ticket-detail-empty">
          <div class="icon">&#128196;</div>
          <p>Select a ticket to view details</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let adminPassword = null;
    let tickets = [];
    let selectedTicketId = null;
    let activeTab = 'open'; // 'open' or 'closed'
    let autoRefreshTimer = null;

    // ── Authentication ──
    function authenticate() {
      const input = document.getElementById('auth-password');
      const password = input.value.trim();
      if (!password) return;

      adminPassword = password;
      sessionStorage.setItem('admin_password', password);

      document.getElementById('auth-screen').style.display = 'none';
      const app = document.getElementById('admin-app');
      app.style.display = 'flex';

      refreshTickets();
      startAutoRefresh();
    }

    function logout() {
      adminPassword = null;
      sessionStorage.removeItem('admin_password');
      stopAutoRefresh();
      document.getElementById('admin-app').style.display = 'none';
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('auth-password').value = '';
    }

    function init() {
      const saved = sessionStorage.getItem('admin_password');
      if (saved) {
        adminPassword = saved;
        document.getElementById('auth-screen').style.display = 'none';
        const app = document.getElementById('admin-app');
        app.style.display = 'flex';
        refreshTickets();
        startAutoRefresh();
      }
    }

    // ── Auto-refresh ──
    function startAutoRefresh() {
      stopAutoRefresh();
      autoRefreshTimer = setInterval(() => {
        refreshTickets();
        updateRefreshIndicator();
      }, 30000);
    }

    function stopAutoRefresh() {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }

    function updateRefreshIndicator() {
      const el = document.getElementById('refresh-indicator');
      if (el) {
        el.textContent = 'Updated ' + new Date().toLocaleTimeString();
        setTimeout(() => { if (el) el.textContent = ''; }, 5000);
      }
    }

    // ── Tabs ──
    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-open').classList.toggle('active', tab === 'open');
      document.getElementById('tab-closed').classList.toggle('active', tab === 'closed');
      renderTicketList();
    }

    // ── Ticket list ──
    async function refreshTickets() {
      try {
        const res = await fetch(`${API_BASE}/ticket-list`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ admin_password: adminPassword }),
        });

        if (res.ok) {
          const data = await res.json();
          tickets = data.tickets || [];
        } else {
          const stored = localStorage.getItem('admin_tickets');
          tickets = stored ? JSON.parse(stored) : [];
        }
      } catch (e) {
        const stored = localStorage.getItem('admin_tickets');
        tickets = stored ? JSON.parse(stored) : [];
      }

      renderTicketList();

      // Re-render detail if a ticket is selected (to pick up updates)
      if (selectedTicketId) {
        const ticket = tickets.find((t) => t.ticket_id === selectedTicketId);
        if (ticket) renderTicketDetail(ticket);
      }
    }

    function getFilteredTickets() {
      const openStatuses = ['open', 'in_progress', 'responded'];
      const closedStatuses = ['closed', 'resolved'];

      if (activeTab === 'open') {
        return tickets.filter((t) => openStatuses.includes(t.status || 'open'));
      } else {
        return tickets.filter((t) => closedStatuses.includes(t.status));
      }
    }

    function renderTicketList() {
      const container = document.getElementById('ticket-list-items');
      const countEl = document.getElementById('ticket-count');
      const filtered = getFilteredTickets();
      countEl.textContent = filtered.length;

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">&#128233;</div>
            <p>No ${activeTab === 'open' ? 'open' : 'closed'} tickets</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map((t) => `
        <div class="ticket-item ${t.ticket_id === selectedTicketId ? 'active' : ''}" onclick="selectTicket('${t.ticket_id}')">
          <div class="ticket-row">
            <span class="ticket-id">${escapeHtml(t.ticket_id)}</span>
            <span class="ticket-priority ${t.priority || 'normal'}">${t.priority || 'normal'}</span>
          </div>
          <div class="ticket-subject">${escapeHtml(t.subject || 'No subject')}</div>
          <div class="ticket-company">${escapeHtml(t.company || '')}</div>
          <div class="ticket-meta">
            <span>${t.category || 'general'}</span>
            <span>v${t.version || '?'}</span>
            <span class="status-badge ${t.status || 'open'}">${formatStatus(t.status || 'open')}</span>
            <span>${relativeTime(t.received_at || t.timestamp)}</span>
          </div>
        </div>
      `).join('');
    }

    // ── Ticket detail ──
    function selectTicket(ticketId) {
      selectedTicketId = ticketId;
      const ticket = tickets.find((t) => t.ticket_id === ticketId);
      if (!ticket) return;

      renderTicketList();
      renderTicketDetail(ticket);
    }

    function renderTicketDetail(ticket) {
      const detail = document.getElementById('ticket-detail');
      const hasCallback = ticket.callback_url && ticket.callback_url.length > 0;

      // Build conversation history from comments array + last_response fallback
      const comments = buildConversation(ticket);

      detail.innerHTML = `
        <div class="ticket-detail-header">
          <h2>${escapeHtml(ticket.subject || 'No subject')}</h2>
          <div class="detail-meta">
            <span><strong>Company:</strong> ${escapeHtml(ticket.company || 'Unknown')}</span>
            <span><strong>ID:</strong> ${escapeHtml(ticket.ticket_id)}</span>
            <span><strong>Priority:</strong> ${ticket.priority || 'normal'}</span>
            <span><strong>Category:</strong> ${ticket.category || 'general'}</span>
            <span><strong>Version:</strong> ${ticket.version || 'unknown'}</span>
            <span><strong>Status:</strong> <span class="status-badge ${ticket.status || 'open'}">${formatStatus(ticket.status || 'open')}</span></span>
            <span>${relativeTime(ticket.received_at || ticket.timestamp)}</span>
          </div>
          ${!['closed', 'resolved'].includes(ticket.status) ? `
          <div class="ticket-action-buttons">
            <button class="btn-close-ticket" onclick="closeTicket('${escapeAttr(ticket.ticket_id)}', '${escapeAttr(ticket.callback_url || '')}')">Close Ticket</button>
            <button class="btn-resolve-ticket" onclick="resolveTicket('${escapeAttr(ticket.ticket_id)}', '${escapeAttr(ticket.callback_url || '')}')">Resolve Ticket</button>
          </div>
          ` : ''}
        </div>

        <div class="ticket-detail-body">
          <div class="detail-section">
            <label>Description</label>
            <div class="value">${escapeHtml(ticket.description || 'No description provided')}</div>
          </div>

          <div class="conversation-history">
            <h4>Conversation</h4>
            ${comments.length === 0
              ? '<div class="conversation-empty">No messages yet.</div>'
              : comments.map((c) => `
                <div class="comment-entry ${c.type}">
                  <div class="comment-header">
                    <span class="comment-author">${c.type === 'customer' ? 'Customer' : 'Horaxis Support'}</span>
                    <span class="comment-time">${relativeTime(c.timestamp)}</span>
                  </div>
                  <div class="comment-text">${escapeHtml(c.message)}</div>
                </div>
              `).join('')
            }
          </div>
        </div>

        ${hasCallback ? `
        <div class="response-area">
          <textarea id="response-text" placeholder="Type your response to the customer..."></textarea>
          <div class="response-actions">
            <span class="send-status" id="send-status"></span>
            <button class="btn-send" id="btn-send-response" onclick="sendResponse('${escapeAttr(ticket.ticket_id)}', '${escapeAttr(ticket.callback_url)}')">Send Response</button>
          </div>
        </div>
        ` : `
        <div class="response-area">
          <p style="color:#64748b; font-size:13px; padding:8px 0;">No callback URL — cannot send response to this ticket.</p>
        </div>
        `}
      `;
    }

    function buildConversation(ticket) {
      const comments = [];

      // Add entries from the comments array
      if (Array.isArray(ticket.comments)) {
        for (const c of ticket.comments) {
          comments.push({
            type: (c.author || '').toLowerCase().includes('support') ? 'support' : 'customer',
            message: c.message || c.text || '',
            timestamp: c.timestamp || '',
            sortTime: new Date(c.timestamp || 0).getTime(),
          });
        }
      }

      // If there's a last_response but no matching support comment, add it
      if (ticket.last_response) {
        const alreadyInComments = comments.some(
          (c) => c.type === 'support' && c.message === ticket.last_response
        );
        if (!alreadyInComments) {
          comments.push({
            type: 'support',
            message: ticket.last_response,
            timestamp: ticket.responded_at || '',
            sortTime: new Date(ticket.responded_at || 0).getTime(),
          });
        }
      }

      // Sort chronologically
      comments.sort((a, b) => a.sortTime - b.sortTime);
      return comments;
    }

    // ── Send response ──
    async function sendResponse(ticketId, callbackUrl) {
      const textarea = document.getElementById('response-text');
      const statusEl = document.getElementById('send-status');
      const btn = document.getElementById('btn-send-response');
      const message = textarea.value.trim();

      if (!message) {
        statusEl.textContent = 'Please enter a response message.';
        statusEl.style.color = '#ef4444';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = 'Sending...';
      statusEl.style.color = '#94a3b8';

      try {
        const res = await fetch(`${API_BASE}/ticket-respond`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ticket_id: ticketId,
            message,
            callback_url: callbackUrl,
            admin_password: adminPassword,
          }),
        });

        let data;
        try {
          data = await res.json();
        } catch (jsonErr) {
          data = { error: `Server returned ${res.status}` };
        }

        // Worker returns signed payload — browser delivers it to customer
        if (res.ok && data.status === 'signed' && data.payload && data.callback_url) {
          statusEl.textContent = 'Delivering to customer...';
          try {
            const cbRes = await fetch(data.callback_url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data.payload),
            });
            if (!cbRes.ok) {
              const cbErr = await cbRes.text().catch(() => '');
              statusEl.textContent = 'Failed to deliver: ' + cbErr;
              statusEl.style.color = '#ef4444';
              btn.disabled = false;
              return;
            }
          } catch (cbE) {
            statusEl.textContent = 'Could not reach customer server: ' + cbE.message;
            statusEl.style.color = '#ef4444';
            btn.disabled = false;
            return;
          }
        }

        if (res.ok && (data.status === 'sent' || data.status === 'signed')) {
          statusEl.textContent = 'Response sent successfully.';
          statusEl.style.color = '#86efac';
          textarea.value = '';

          // Update local ticket state
          const ticket = tickets.find((t) => t.ticket_id === ticketId);
          if (ticket) {
            ticket.status = 'responded';
            ticket.responded_at = new Date().toISOString();
            ticket.last_response = message;

            // Also add to local comments array for immediate UI update
            if (!Array.isArray(ticket.comments)) ticket.comments = [];
            ticket.comments.push({
              author: 'Horaxis Support',
              message: message,
              timestamp: new Date().toISOString(),
            });
          }

          // Re-render after short delay
          setTimeout(() => {
            renderTicketList();
            if (ticket) renderTicketDetail(ticket);
          }, 1500);
        } else {
          statusEl.textContent = data.error || 'Failed to send response.';
          statusEl.style.color = '#ef4444';
        }
      } catch (e) {
        statusEl.textContent = 'Error: ' + (e.message || 'Could not reach API.');
        statusEl.style.color = '#ef4444';
        console.error('Send response error:', e);
      }

      btn.disabled = false;
    }

    // ── Close / Resolve ticket ──
    async function changeTicketStatus(ticketId, callbackUrl, newStatus) {
      const statusLabel = newStatus === 'closed' ? 'Closed' : 'Resolved';
      const message = `Ticket ${statusLabel.toLowerCase()} by Horaxis Support.`;

      // Disable buttons while processing
      document.querySelectorAll('.btn-close-ticket, .btn-resolve-ticket').forEach(b => { b.disabled = true; });

      try {
        // Send the status-change message via the existing respond endpoint
        const res = await fetch(`${API_BASE}/ticket-respond`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ticket_id: ticketId,
            message: message,
            callback_url: callbackUrl || '',
            admin_password: adminPassword,
            new_status: newStatus,
          }),
        });

        let data;
        try { data = await res.json(); } catch (e) { data = {}; }

        // If the worker returns a signed payload, deliver it
        if (res.ok && data.status === 'signed' && data.payload && data.callback_url) {
          try {
            await fetch(data.callback_url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data.payload),
            });
          } catch (e) { /* delivery failure is non-blocking */ }
        }
      } catch (e) {
        console.error('Status change API error:', e);
      }

      // Update local ticket state regardless of API outcome
      const ticket = tickets.find(t => t.ticket_id === ticketId);
      if (ticket) {
        ticket.status = newStatus;
        if (!Array.isArray(ticket.comments)) ticket.comments = [];
        ticket.comments.push({
          author: 'Horaxis Support',
          message: message,
          timestamp: new Date().toISOString(),
        });

        // Re-render list and detail, then switch to closed tab
        renderTicketList();
        renderTicketDetail(ticket);

        // After a short delay, switch to the Closed tab so the user sees the ticket there
        setTimeout(() => {
          switchTab('closed');
          selectedTicketId = ticketId;
          renderTicketList();
          renderTicketDetail(ticket);
        }, 800);
      }
    }

    function closeTicket(ticketId, callbackUrl) {
      changeTicketStatus(ticketId, callbackUrl, 'closed');
    }

    function resolveTicket(ticketId, callbackUrl) {
      changeTicketStatus(ticketId, callbackUrl, 'resolved');
    }

    // ── Helpers ──
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeAttr(text) {
      return (text || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function formatStatus(status) {
      const labels = {
        open: 'Open',
        in_progress: 'In Progress',
        responded: 'Responded',
        closed: 'Closed',
        resolved: 'Resolved',
      };
      return labels[status] || status;
    }

    function relativeTime(value) {
      if (!value) return '';
      try {
        const date = typeof value === 'number' ? new Date(value * 1000) : new Date(value);
        const now = new Date();
        const diff = now - date;

        if (diff < 0) return 'just now';
        if (diff < 60000) return 'just now';
        if (diff < 3600000) {
          const m = Math.floor(diff / 60000);
          return m === 1 ? '1 minute ago' : m + ' minutes ago';
        }
        if (diff < 86400000) {
          const h = Math.floor(diff / 3600000);
          return h === 1 ? '1 hour ago' : h + ' hours ago';
        }
        if (diff < 604800000) {
          const d = Math.floor(diff / 86400000);
          return d === 1 ? '1 day ago' : d + ' days ago';
        }
        return date.toLocaleDateString();
      } catch (e) {
        return String(value);
      }
    }

    // Init
    init();
  </script>
</body>
</html>
